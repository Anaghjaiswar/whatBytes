

x-core-image: &core-image
  build:
    context: .

services:

  core:
    <<: *core-image  # Reference the build configuration
    restart: always
    volumes:
      - ./core:/core
      - ./scripts:/scripts
      - static_data:/vol/web
    env_file: .env
    command: /scripts/run.sh
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DJANGO_DEBUG=1
    depends_on:
      - db

    ports:
      - "8000:8000"
    cpus: 2.0
    cpu_shares: 512
    mem_limit: 4g
    mem_reservation: 2g

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASS}
    ports:
      - "5432:5432"
    cpus: 6.0
    cpu_shares: 2048
    mem_limit: 16g
    mem_reservation: 10g
    volumes:
      - db_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine
    ports:
      - "5001:6379"
    cpus: 1.0
    cpu_shares: 256
    mem_limit: 2g
    mem_reservation: 1g
    command: redis-server --requirepass ${REDIS_PASSWORD}



volumes:
  db_data:
  static_data: